const STORAGE_KEY = "linguacoach_v4";
function defaultState() {
  return { sessions:0, totalScore:0, streak:0, lastDate:null, errorsFixed:0, totalXP:0, cefrLevel:null, weaknesses:{}, history:[], lang:"nl-NL" };
}
function levelFromXP(xp) { let l="A1"; for (const v of CEFR_LEVELS) { if (xp >= CEFR_XP[v]) l=v; } return l; }
function xpForScore(s)    { return s>=90?30 : s>=75?20 : s>=60?12 : 5; }
function analyseText(text, lang) {
  const rules = GRAMMAR_RULES[lang] || GRAMMAR_RULES["en-GB"];
  const issues = rules.filter(r => r.pattern.test(text));
  if (text.trim().split(/\s+/).length < 3)
    issues.push({ id:"short", category:"fluency", message:"Probeer in volledige zinnen te spreken voor betere oefening.", severity:"warning", example:"" });
  return issues;
}
function scoreIssues(issues) { return Math.max(0, 100 - issues.reduce((s,i) => s + (i.severity==="error"?25:10), 0)); }
function pickPrompt(lang, cefrLevel) {
  const all = PROMPTS[lang] || PROMPTS["nl-NL"];
  const idx = CEFR_LEVELS.indexOf(cefrLevel||"A1");
  const eligible = all.filter(p => { const pi=CEFR_LEVELS.indexOf(p.level); return pi>=Math.max(0,idx-1) && pi<=Math.min(5,idx+1); });
  const pool = eligible.length ? eligible : all;
  return pool[Math.floor(Math.random()*pool.length)];
}
function loadPersistedState() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? {...defaultState(), ...JSON.parse(s)} : defaultState(); } catch(e) { return defaultState(); }
}
function savePersistedState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

// SPEECH HOOK  — fresh instance every time
// ─────────────────────────────────────────
function useSpeech(lang) {
  const [speechState, setSpeechState] = useState("idle"); // idle|requesting|listening|done|error
  const [transcript, setTranscript]   = useState("");
  const [errorMsg, setErrorMsg]       = useState("");
  const recRef = useRef(null);

  const start = useCallback(async () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setSpeechState("error");
      setErrorMsg("Spraakherkenning niet beschikbaar. Gebruik Chrome op Android of Safari op iOS.");
      return;
    }
    setSpeechState("requesting");
    setTranscript("");
    setErrorMsg("");

    // Explicit getUserMedia — triggers browser permission prompt over HTTPS
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
    } catch(e) {
      setSpeechState("error");
      setErrorMsg("🎤 Microfoon geweigerd. Tik op het slotje in de adresbalk → Microfoon → Toestaan, en probeer opnieuw.");
      return;
    }

    // Always a brand-new instance — reusing after end/error causes silent failure
    const rec = new SR();
    rec.lang = lang;
    rec.continuous = false;
    rec.interimResults = true;
    recRef.current = rec;

    rec.onstart  = () => setSpeechState("listening");
    rec.onresult = (e) => {
      let final="", interim="";
      for (let i=e.resultIndex; i<e.results.length; i++) {
        if (e.results[i].isFinal) final  += e.results[i][0].transcript;
        else                       interim += e.results[i][0].transcript;
      }
      setTranscript(final || interim);
      if (final) { try { rec.stop(); } catch(_){} }
    };
    rec.onerror  = (e) => {
      recRef.current = null;
      const msgs = {
        "not-allowed": "🎤 Microfoon geweigerd. Controleer de browserinstellingen.",
        "no-speech":   "Geen spraak gedetecteerd — tik om opnieuw te proberen.",
        "network":     "Netwerkfout — controleer je verbinding (spraakherkenning vereist internet).",
        "aborted":     "",
      };
      if (msgs[e.error] === "") { setSpeechState("idle"); }
      else { setSpeechState("error"); setErrorMsg(msgs[e.error] ?? ("Fout: " + e.error)); }
    };
    rec.onend    = () => { recRef.current = null; setSpeechState(st => st==="listening" ? "done" : st); };

    try { rec.start(); }
    catch(e) { recRef.current=null; setSpeechState("error"); setErrorMsg("Kon opname niet starten — probeer opnieuw."); }
  }, [lang]);

  const stop  = useCallback(() => { if (recRef.current) { try { recRef.current.stop(); } catch(_){} recRef.current=null; } }, []);
  const reset = useCallback(() => { stop(); setSpeechState("idle"); setTranscript(""); setErrorMsg(""); }, [stop]);

  return { speechState, transcript, errorMsg, start, stop, reset };
}

function Placement({ onComplete }) {
  const [lang, setLang]           = useState("nl-NL");
  const [step, setStep]           = useState(0);
  const [selfScore, setSelfScore] = useState(null);
  const [grammarChosen, setGrammarChosen] = useState(null);
  const [grammarCorrect, setGrammarCorrect] = useState(false);
  const speech1 = useSpeech(lang);
  const speech3 = useSpeech(lang);
  const pd = PLACEMENT[lang] || PLACEMENT["nl-NL"];
  const progress = [0,25,50,75,100][Math.min(step,4)];

  const LANGS = [["nl-NL","🇳🇱 Nederlands"],["en-GB","🇬🇧 English"],["es-ES","🇪🇸 Español"],["fr-FR","🇫🇷 Français"],["de-DE","🇩🇪 Deutsch"],["it-IT","🇮🇹 Italiano"]];

  const finish = (skipSpeech) => {
    const selfMap = ["A1","A2","B1","C1"];
    const words = skipSpeech ? 0 : (speech3.transcript||"").trim().split(/\s+/).filter(w=>w.length>1).length;
    const speechBonus = words>15?1 : words<4?-1 : 0;
    const idx = Math.max(0, Math.min(5, CEFR_LEVELS.indexOf(selfMap[selfScore??0]) + (grammarCorrect?1:0) + speechBonus));
    onComplete({ level: CEFR_LEVELS[idx], lang });
  };

  const MicSection = ({speech, emptyMsg}) => (
    <div>
      <button
        onClick={() => speech.speechState==="listening" ? speech.stop() : speech.start()}
        style={{ width:72, height:72, borderRadius:"50%", border:"none", cursor:"pointer",
          background: speech.speechState==="listening" ? "#c0392b" : "#d4883a",
          display:"flex", alignItems:"center", justifyContent:"center",
          margin:"18px auto 12px",
          animation: speech.speechState==="listening" ? "ptpulse 1.2s infinite" : "none",
          boxShadow:"0 4px 20px rgba(212,136,58,0.4)" }}>
        <MicIcon size={28} />
      </button>
      <div style={{ background:"rgba(255,255,255,0.08)", borderRadius:10, padding:"11px 14px",
        color: (!speech.transcript && speech.speechState!=="error") ? "rgba(245,240,232,0.4)" : "#f5f0e8",
        fontStyle: (!speech.transcript && speech.speechState!=="error") ? "italic" : "normal",
        fontSize: (!speech.transcript && speech.speechState!=="error") ? 13 : 15,
        minHeight:52, marginBottom:12, border:"1px solid rgba(255,255,255,0.12)", lineHeight:1.5 }}>
        { speech.speechState==="requesting" ? "Microfoon activeren…"
        : speech.speechState==="error"      ? speech.errorMsg
        : speech.transcript                 ? speech.transcript
        : speech.speechState==="listening"  ? "…"
        : emptyMsg }
      </div>
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"#1a1a2e", zIndex:999, display:"flex", flexDirection:"column", overflowY:"auto" }}>
      {/* Hero */}
      <div style={{ padding:"40px 24px 22px", background:"linear-gradient(160deg,#1a1a2e 0%,#16213e 100%)", textAlign:"center" }}>
        <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:30, color:"#f5f0e8", marginBottom:4 }}>
          Lingua<span style={{color:"#f0c078"}}>Coach</span>
        </div>
        <div style={{ fontSize:13, color:"rgba(245,240,232,0.55)", marginBottom:20 }}>Spreek. Leer. Verbeter.</div>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap", justifyContent:"center", marginBottom:8 }}>
          {LANGS.map(([code,label]) => (
            <button key={code}
              onClick={() => { setLang(code); speech1.reset(); speech3.reset(); }}
              style={{ padding:"7px 13px", borderRadius:20, border: lang===code?"none":"1.5px solid rgba(255,255,255,0.2)",
                background: lang===code?"#d4883a":"rgba(255,255,255,0.06)", color:"#f5f0e8",
                fontSize:12, cursor:"pointer", fontWeight: lang===code?600:400, fontFamily:"inherit" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:"20px 20px 48px", flex:1 }}>
        {/* Progress bar */}
        <div style={{ height:3, background:"rgba(255,255,255,0.1)", borderRadius:2, overflow:"hidden", marginBottom:24 }}>
          <div style={{ height:"100%", width:progress+"%", background:"#d4883a", transition:"width 0.4s" }} />
        </div>

        {/* Step 0 — self-report */}

            <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:1, color:"rgba(245,240,232,0.4)", marginBottom:4 }}>Stap 1 van 4</div>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, color:"#f5f0e8", marginBottom:6, lineHeight:1.3 }}>Hoe zou jij je niveau omschrijven?</div>
            <div style={{ fontSize:13, color:"rgba(245,240,232,0.6)", marginBottom:18, lineHeight:1.5 }}>Dit helpt ons een startpunt te bepalen. Daarna volgt een korte spreektoets.</div>

                  border: selfScore===i ? "1.5px solid #d4883a" : "1.5px solid rgba(255,255,255,0.15)",
                  background: selfScore===i ? "#d4883a" : "rgba(255,255,255,0.06)",

          </div>

        {/* Step 1 — repeat sentence */}

            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, color:"#f5f0e8", marginBottom:6 }}>Zeg deze zin hardop:</div>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:18, color:"#f5f0e8", fontStyle:"italic", marginBottom:18, lineHeight:1.4, padding:"12px 14px", background:"rgba(255,255,255,0.07)", borderRadius:10, border:"1px solid rgba(255,255,255,0.12)" }}>
              "{pd.repeatPrompt}"
            </div>
            <MicSection speech={speech1} emptyMsg="Tik op de microfoon en spreek" />
            <button onClick={() => setStep(2)}
              style={{ width:"100%", padding:13, borderRadius:10, background:"#d4883a", border:"none", color:"white", fontSize:15, fontWeight:600, cursor:"pointer", fontFamily:"inherit", marginTop:4 }}>
              Volgende →
            </button>
            <button onClick={() => setStep(2)}
              style={{ width:"100%", padding:13, borderRadius:10, marginTop:7, background:"rgba(255,255,255,0.09)", border:"1.5px solid rgba(255,255,255,0.2)", color:"#f5f0e8", fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
              Sla over
            </button>
          </div>
        )}

        {/* Step 2 — grammar MCQ */}
        {step===2 && (
          <div className="fade-in">
            <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:1, color:"rgba(245,240,232,0.4)", marginBottom:4 }}>Stap 3 van 4 · Grammatica</div>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, color:"#f5f0e8", marginBottom:18, lineHeight:1.3 }}>{pd.grammarQ}</div>
            {pd.grammarOpts.map((opt,i) => {
              const answered = grammarChosen !== null;
              const isCorrect = i===pd.grammarAns;
              const isChosen  = i===grammarChosen;
              return (
                <button key={i}
                  onClick={() => { if (!answered) { setGrammarChosen(i); setGrammarCorrect(i===pd.grammarAns); } }}
                  style={{ display:"block", width:"100%", padding:"12px 15px", borderRadius:10, marginBottom:8,
                    border: answered && isCorrect ? "1.5px solid #27734a" : answered && isChosen ? "1.5px solid #c0392b" : "1.5px solid rgba(255,255,255,0.15)",
                    background: answered && isCorrect ? "rgba(39,115,74,0.3)" : answered && isChosen ? "rgba(192,57,43,0.25)" : "rgba(255,255,255,0.06)",
                    color:"#f5f0e8", fontSize:14, cursor: answered?"default":"pointer", textAlign:"left", fontFamily:"inherit", lineHeight:1.4 }}>
                  {opt}
                </button>
              );
            })}
            <button onClick={() => setStep(3)} disabled={grammarChosen===null}
              style={{ width:"100%", padding:13, borderRadius:10, marginTop:6,
                background: grammarChosen===null?"rgba(255,255,255,0.05)":"#d4883a",
                border:"none", color: grammarChosen===null?"rgba(255,255,255,0.3)":"white",
                fontSize:15, fontWeight:600, cursor: grammarChosen===null?"not-allowed":"pointer",
                fontFamily:"inherit", pointerEvents: grammarChosen===null?"none":"auto" }}>
              Volgende →
            </button>
          </div>
        )}

        {/* Step 3 — free speech */}
        {step===3 && (
          <div className="fade-in">
            <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:1, color:"rgba(245,240,232,0.4)", marginBottom:4 }}>Stap 4 van 4 · Vrij spreken</div>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, color:"#f5f0e8", marginBottom:6 }}>Beschrijf dit in een paar zinnen:</div>
            <div style={{ fontSize:13, color:"rgba(245,240,232,0.6)", marginBottom:16, lineHeight:1.5 }}>{pd.freePrompt}</div>
            <MicSection speech={speech3} emptyMsg="Tik op de microfoon en beschrijf" />
            <button onClick={() => finish(false)}
              style={{ width:"100%", padding:13, borderRadius:10, background:"#d4883a", border:"none", color:"white", fontSize:15, fontWeight:600, cursor:"pointer", fontFamily:"inherit", marginTop:4 }}>
              Zie mijn niveau →
            </button>
            <button onClick={() => finish(true)}
              style={{ width:"100%", padding:13, borderRadius:10, marginTop:7, background:"rgba(255,255,255,0.09)", border:"1.5px solid rgba(255,255,255,0.2)", color:"#f5f0e8", fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>

        )}

  );
}

function ExerciseCard({ ex, catLabel }) {
  const [chosen, setChosen]   = useState(null);
  const [fillVal, setFillVal] = useState("");
  const [fillOk, setFillOk]   = useState(null);
  const [shown, setShown]     = useState(false);

  return (
    <div style={{ background:"white", borderRadius:12, padding:15, border:"1px solid #d0c8b8", marginBottom:10, boxShadow:"0 2px 6px rgba(26,26,46,0.06)" }}>
      <div style={{ display:"inline-block", fontSize:10, textTransform:"uppercase", letterSpacing:0.8, padding:"2px 7px", borderRadius:20, background:"#fdf4e3", color:"#d4883a", fontWeight:600, marginBottom:8 }}>
        {catLabel}
      </div>
      <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:15, lineHeight:1.5, marginBottom:10 }}>{ex.q}</div>

      {ex.type==="mcq" ? (
        ex.opts.map((opt,i) => {
          const answered = chosen!==null;
          const st = answered ? (i===ex.ans?"correct":chosen===i?"wrong":"") : "";
          return (
            <button key={i} onClick={() => { if (chosen===null) { setChosen(i); setShown(true); } }}
              style={{ display:"block", width:"100%", padding:"9px 12px", borderRadius:8, marginBottom:6,
                border: st==="correct"?"1.5px solid #27734a":st==="wrong"?"1.5px solid #c0392b":"1.5px solid #d0c8b8",
                background: st==="correct"?"rgba(39,115,74,0.08)":st==="wrong"?"rgba(192,57,43,0.08)":"#ede8db",
                color: st==="correct"?"#27734a":st==="wrong"?"#c0392b":"#1a1a2e",
                fontSize:13, cursor: answered?"default":"pointer", textAlign:"left", fontFamily:"inherit" }}>
              {opt}
            </button>
          );
        })
      ) : (
        <div>
          <input value={fillVal} placeholder="Typ je antwoord…"
            onChange={e => setFillVal(e.target.value)}
            onKeyDown={e => { if(e.key==="Enter") { const ok=fillVal.trim().toLowerCase()===ex.ans.toLowerCase(); setFillOk(ok); if(!ok)setFillVal(""); setShown(true); } }}
            style={{ width:"100%", padding:"9px 12px", borderRadius:8, marginBottom:8,
              border: fillOk===null?"1.5px solid #d0c8b8":fillOk?"1.5px solid #27734a":"1.5px solid #c0392b",
              fontSize:14, fontFamily:"inherit", background:"#ede8db", color:"#1a1a2e", outline:"none", boxSizing:"border-box" }} />
          {fillOk===false && <div style={{ fontSize:12, color:"#d4883a", marginBottom:6 }}>Correct: {ex.ans}</div>}
          <button onClick={() => { const ok=fillVal.trim().toLowerCase()===ex.ans.toLowerCase(); setFillOk(ok); if(!ok)setFillVal(""); setShown(true); }}
            style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid #d0c8b8", background:"#ede8db", fontSize:13, cursor:"pointer", fontFamily:"inherit", marginBottom:4 }}>
            Controleer
          </button>
        </div>
      )}
      {shown && <div style={{ fontSize:12, color:"#7a7268", marginTop:8, padding:"7px 11px", background:"#fdf4e3", borderRadius:6, lineHeight:1.5 }}>{ex.explain}</div>}
    </div>
  );
}

function App() {
  const [state, setState]   = useState(loadPersistedState);
  const [tab, setTab]       = useState("practice");
  const [prompt, setPrompt] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const lang = state.lang || "nl-NL";
  const speech = useSpeech(lang);

  const save = useCallback(ns => { setState(ns); savePersistedState(ns); }, []);

  useEffect(() => {
    if (state.cefrLevel && !prompt) setPrompt(pickPrompt(lang, state.cefrLevel));
  }, [state.cefrLevel]);

  const handlePlacementComplete = ({ level, lang: newLang }) => {
    const ns = { ...defaultState(), cefrLevel: level, totalXP: CEFR_XP[level]+50, lang: newLang };
    save(ns);
    setPrompt(pickPrompt(newLang, level));
  };

  const newPrompt = useCallback(() => {
    speech.reset(); setFeedback(null); setShowHint(false);
    setPrompt(pickPrompt(lang, state.cefrLevel));
  }, [lang, state.cefrLevel, speech]);

  const checkSpeech = () => {
    const text = speech.transcript; if (!text.trim()) return;
    const issues = analyseText(text, lang);
    const score  = scoreIssues(issues);
    const xp     = xpForScore(score);
    const newXP  = (state.totalXP||0) + xp;
    const newLevel = levelFromXP(newXP);
    const leveledUp = newLevel !== state.cefrLevel;
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now()-86400000).toDateString();
    const ns = {
      ...state,
      sessions:     state.sessions+1,
      totalScore:   state.totalScore+score,
      totalXP:      newXP,
      cefrLevel:    newLevel,
      errorsFixed:  state.errorsFixed + (!issues.some(i=>i.severity==="error")?1:0),
      streak:       state.lastDate===today ? state.streak : state.lastDate===yesterday ? state.streak+1 : 1,
      lastDate:     today,
      weaknesses:   issues.reduce((w,i) => { w[i.category]={count:(w[i.category]?.count||0)+1}; return {...w}; }, {...state.weaknesses}),
      history:      [{date:new Date().toLocaleDateString("nl-NL"),score,xp,errors:issues.length,lang},...(state.history||[])].slice(0,30),
    };
    save(ns);
    setFeedback({ issues, score, xp, leveledUp, newLevel });
  };

  if (!state.cefrLevel) return <Placement onComplete={handlePlacementComplete} />;

  // Progress helpers
  const level  = state.cefrLevel || "A1";
  const xp     = state.totalXP || 0;
  const lidx   = CEFR_LEVELS.indexOf(level);
  const nextLvl = CEFR_LEVELS[lidx+1];
  const xpInto = xp - CEFR_XP[level];
  const xpNeed = nextLvl ? CEFR_XP[nextLvl]-CEFR_XP[level] : 1000;
  const xpPct  = Math.min(100, Math.round((xpInto/xpNeed)*100));
  const weakEntries = Object.entries(state.weaknesses||{}).sort((a,b)=>b[1].count-a[1].count);
  const exCats = weakEntries.slice(0,3).map(([c])=>c);
  const fallbackCats = ["articles","word_order","perfect_tense"];
  const renderCats = exCats.length ? exCats : fallbackCats;

  const micBg = speech.speechState==="listening" ? "#c0392b" : speech.speechState==="requesting" ? "#d4883a" : "#1a1a2e";
  const micAnim = speech.speechState==="listening" ? "micpulse 1.4s infinite" : "none";

  const levelTagStyle = (lv) => ({ fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:8, background:CEFR_COLORS[lv]||"#999", color:lv==="B1"?"#1a1a2e":"white" });

  return (
    <div style={{ fontFamily:"'DM Sans',system-ui,sans-serif", background:"#f5f0e8", minHeight:"100vh", color:"#1a1a2e", paddingBottom:80 }}>

      {/* ── HEADER ── */}
      <div style={{ background:"#1a1a2e", color:"#f5f0e8", padding:"13px 16px", position:"sticky", top:0, zIndex:100, display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 2px 12px rgba(26,26,46,0.18)" }}>
        <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, letterSpacing:-0.5 }}>
          Lingua<span style={{color:"#f0c078"}}>Coach</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:9 }}>
          <button onClick={() => setTab("progress")}
            style={{ fontSize:12, fontWeight:700, padding:"3px 10px", borderRadius:12, background:CEFR_COLORS[level]||"#d4883a", color:level==="B1"?"#1a1a2e":"white", border:"none", cursor:"pointer", fontFamily:"inherit", letterSpacing:0.3 }}>
            {level}
          </button>
          <select value={lang}
            onChange={e => { save({...state, lang:e.target.value}); speech.reset(); setFeedback(null); setShowHint(false); setPrompt(pickPrompt(e.target.value, state.cefrLevel)); }}
            style={{ background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.22)", borderRadius:20, padding:"4px 10px", color:"#f5f0e8", fontSize:12, cursor:"pointer", fontFamily:"inherit", outline:"none" }}>
            <option value="nl-NL">🇳🇱 NL</option>

                : "Tik om te spreken" }
              </strong>
              <span style={{ fontSize:12 }}>
                { speech.speechState==="listening" ? "Tik nogmaals om te stoppen"
                : speech.speechState==="done"      ? "Tik om opnieuw op te nemen"
                : "" }
              </span>
            </div>
          </div>

          {/* Error banner */}
          {speech.speechState==="error" && speech.errorMsg && (
            <div style={{ background:"rgba(212,136,58,0.12)", border:"1px solid #d4883a", color:"#c47820", borderRadius:8, padding:"9px 13px", fontSize:13, marginBottom:12, lineHeight:1.5 }}>
              {speech.errorMsg}
            </div>
          )}

          {/* Transcript */}
          <div style={{ background:"white", borderRadius:12, padding:13, border:"1px solid #d0c8b8", minHeight:68, fontSize:15, lineHeight:1.6, marginBottom:11,
            color: !speech.transcript?"#7a7268":"#1a1a2e", fontStyle: !speech.transcript?"italic":"normal" }}>
            { speech.transcript || (speech.speechState==="listening"?"…":"Uw uitspraak verschijnt hier…") }
          </div>

          {/* Feedback */}
          {feedback && (
            <div style={{ background:"white", borderRadius:12, border:"1px solid #d0c8b8", overflow:"hidden", marginBottom:12 }} className="fade-in">
              <div style={{ padding:"10px 15px", background:"#ede8db", borderBottom:"1px solid #d0c8b8", fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5, color:"#7a7268", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span>Feedback</span>
                <span style={{ fontSize:12, fontWeight:700, padding:"2px 9px", borderRadius:12, color:"white", background:feedback.score>=80?"#27734a":feedback.score>=60?"#d4883a":"#c0392b" }}>{feedback.score}%</span>
              </div>
              {feedback.leveledUp && (
                <div style={{ padding:"11px 15px", borderBottom:"1px solid #d0c8b8", background:"#fdf4e3" }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:0.5, fontWeight:700, color:"#2c5f8a", marginBottom:3 }}>🎉 NIVEAU OMHOOG!</div>
                  <div style={{ fontSize:13 }}>Je bent gestegen naar <strong>{feedback.newLevel}</strong>!</div>
                </div>
              )}
              <div style={{ padding:"11px 15px", borderBottom: feedback.issues.length?"1px solid #d0c8b8":"none" }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:0.5, fontWeight:700, color:"#2c5f8a", marginBottom:2 }}>+{feedback.xp} XP verdiend</div>
              </div>
              {feedback.issues.length===0 ? (
                <div style={{ padding:"11px 15px" }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", fontWeight:700, color:"#27734a", marginBottom:2 }}>UITSTEKEND</div>
                  <div style={{ fontSize:13 }}>Geen fouten gevonden! Goed gedaan!</div>
                </div>
              ) : feedback.issues.map((issue,i) => (
                <div key={i} style={{ padding:"11px 15px", borderBottom: i<feedback.issues.length-1?"1px solid #d0c8b8":"none", fontSize:13, lineHeight:1.5 }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:0.5, fontWeight:700, marginBottom:3, color:issue.severity==="error"?"#c0392b":"#d4883a" }}>
                    {issue.severity==="error"?"FOUT":"LET OP"} · {issue.category.replace(/_/g," ").toUpperCase()}
                  </div>
                  <div>{issue.message}</div>
                  {issue.example && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, marginTop:4, padding:"4px 7px", background:"#ede8db", borderRadius:4, borderLeft:"3px solid #27734a" }}>✓ {issue.example}</div>}
                </div>
              ))}
            </div>
          )}

          {/* Actions */}
          <div style={{ display:"flex", gap:9 }}>
            <button onClick={newPrompt} style={{ flex:1, padding:12, borderRadius:10, border:"1px solid #d0c8b8", background:"#ede8db", color:"#1a1a2e", fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"inherit" }}>
              Nieuwe zin
            </button>
            {speech.speechState==="done" && speech.transcript && !feedback && (
              <button onClick={checkSpeech} style={{ flex:1, padding:12, borderRadius:10, border:"none", background:"#d4883a", color:"white", fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"inherit" }}>
                Controleer ✓
              </button>
            )}
          </div>
        </div>
      )}

      {/* ── EXERCISES TAB ── */}
      {tab==="exercises" && (
        <div style={{ padding:16 }}>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:19, marginBottom:3 }}>Gerichte oefeningen</div>
          <div style={{ fontSize:13, color:"#7a7268", marginBottom:13 }}>Afgestemd op jouw zwakke punten</div>
          {renderCats.flatMap(cat =>
            (EXERCISES[cat]||[])
              .filter(e => !e.lang || e.lang===lang || e.lang==="nl-NL")
              .slice(0,2)
              .map((ex,i) => <ExerciseCard key={`${cat}_${i}`} ex={ex} catLabel={cat.replace(/_/g," ")} />)
          )}
          {renderCats.every(c=>!(EXERCISES[c]||[]).length) && (
            <div style={{ textAlign:"center", padding:"28px 14px", color:"#7a7268" }}>
              <div style={{ fontSize:40, marginBottom:8 }}>🎯</div>
              <p style={{ fontSize:13 }}>Doe eerst spreekoefeningen.<br/>Opdrachten worden afgestemd op jouw fouten.</p>
            </div>
          )}
        </div>
      )}

      {/* ── PROGRESS TAB ── */}
      {tab==="progress" && (
        <div style={{ padding:16 }}>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:19, marginBottom:12 }}>Jouw voortgang</div>

          {/* CEFR journey */}
          <div style={{ background:"white", borderRadius:12, padding:16, marginBottom:12, border:"1px solid #d0c8b8" }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:0.8, color:"#7a7268", fontWeight:600, marginBottom:10 }}>CEFR-niveaureis</div>
            <div style={{ display:"flex", borderRadius:8, overflow:"hidden", marginBottom:8 }}>
              {CEFR_LEVELS.map((l,i) => (
                <div key={l} style={{ flex:1, padding:"8px 3px", textAlign:"center", fontSize:12, fontWeight:700,
                  background:CEFR_COLORS[l], color:l==="B1"?"#1a1a2e":"white",
                  opacity: i<=lidx?1:0.28,
                  boxShadow: l===level?"inset 0 0 0 2px rgba(255,255,255,0.65)":"none" }}>
                  {l}
                </div>
              ))}
            </div>
            <div style={{ height:6, background:"#ede8db", borderRadius:3, overflow:"hidden", margin:"7px 0 4px" }}>
              <div style={{ height:"100%", width:xpPct+"%", background:CEFR_COLORS[level], borderRadius:3, transition:"width 0.6s" }} />
            </div>
            <div style={{ fontSize:12, color:"#7a7268", display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <span>{xpInto} XP</span>
              <span>{nextLvl ? `${xpNeed-xpInto} XP naar ${nextLvl}` : "Max niveau! 🎉"}</span>
            </div>
            <div style={{ fontSize:13, color:"#7a7268", lineHeight:1.5 }}>{CEFR_DESCS[level]}</div>
          </div>

          {/* Stats */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:14 }}>
            {[["Sessies",state.sessions||0],["Nauwkeurigheid",state.sessions>0?Math.round(state.totalScore/state.sessions)+"%":"—"],["Reeks 🔥",state.streak||0],["Totaal XP",xp]].map(([label,val]) => (
              <div key={label} style={{ background:"white", borderRadius:12, padding:13, border:"1px solid #d0c8b8", textAlign:"center" }}>
                <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:28, fontWeight:700, lineHeight:1, marginBottom:3 }}>{val}</div>
                <div style={{ fontSize:12, color:"#7a7268" }}>{label}</div>
              </div>
            ))}
          </div>

          {/* Weaknesses */}
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:0.8, color:"#7a7268", fontWeight:600, marginBottom:8 }}>Zwakke punten</div>
          {weakEntries.length===0 ? (
            <div style={{ fontSize:13, color:"#7a7268", marginBottom:12 }}>Nog geen data — begin met oefenen!</div>
          ) : weakEntries.map(([cat,d]) => {
            const pct = Math.round((d.count/weakEntries[0][1].count)*100);
            return (
              <div key={cat} style={{ background:"white", borderRadius:10, padding:"12px 13px", border:"1px solid #d0c8b8", marginBottom:7, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:14, fontWeight:500 }}>{cat.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase())}</div>
                  <div style={{ fontSize:12, color:"#7a7268", marginTop:2 }}>{d.count} fout{d.count!==1?"en":""} gedetecteerd</div>
                </div>
                <div style={{ width:70, height:5, background:"#ede8db", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:pct+"%", background:pct>70?"#c0392b":pct<30?"#27734a":"#d4883a", borderRadius:3, transition:"width 0.5s" }} />
                </div>
              </div>
            );
          })}

          {/* History */}
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:0.8, color:"#7a7268", fontWeight:600, marginTop:14, marginBottom:8 }}>Recente sessies</div>
          {(state.history||[]).length===0 ? (
            <div style={{ fontSize:13, color:"#7a7268" }}>Nog geen sessies.</div>
          ) : (state.history||[]).slice(0,10).map((h,i) => (
            <div key={i} style={{ background:"white", borderRadius:10, border:"1px solid #d0c8b8", padding:"11px 13px", marginBottom:7, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:12, color:"#7a7268" }}>{h.date} · {h.lang}</div>
                <div style={{ fontSize:12, color:"#7a7268", marginTop:1 }}>{h.errors} fout{h.errors!==1?"en":""} · +{h.xp} XP</div>
              </div>
              <div style={{ fontSize:14, fontWeight:600, color:h.score>=80?"#27734a":h.score>=60?"#d4883a":"#c0392b" }}>{h.score}%</div>
            </div>
          ))}

          <button onClick={() => { if(window.confirm("Alle voortgang verwijderen? Dit kan niet ongedaan worden gemaakt.")) { save({...defaultState(), lang}); } }}
            style={{ width:"100%", padding:12, borderRadius:10, border:"1px solid #d0c8b8", background:"#ede8db", color:"#7a7268", fontSize:13, cursor:"pointer", fontFamily:"inherit", marginTop:10 }}>
            Voortgang resetten
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
